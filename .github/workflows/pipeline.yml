name: Execute Pipelines

on:
  push:
    branches: [main]
    paths:
      - "context/**"
      - "pipelines/**"
      - "routing.yaml"

jobs:
  route-and-execute:
    runs-on: self-hosted

    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          fetch-depth: 2  # need previous commit to diff against
          token: ${{ secrets.GITHUB_TOKEN }}

      - name: Install Python dependencies
        run: pip3 install -r requirements.txt --quiet

      - name: Route and execute pipelines
        run: |
          export PATH="$HOME/.local/bin:/usr/local/bin:$PATH"
          python3 tools/router.py

      - name: Commit results
        run: |
          git config user.email "pipeline@local"
          git config user.name "Pipeline Bot"
          git add summaries/ context/ pipelines/
          git diff --staged --quiet || (git commit -m "pipeline: auto-output [skip ci]" && git push)
